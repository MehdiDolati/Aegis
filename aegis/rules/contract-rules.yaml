# ASES Contract Rules
# Rules based on research: VibeContract (arXiv:2603.15691)

rules:
  - id: CTR-001
    title: Contract exists for each task
    description: Every task must have a contract defining inputs, outputs, constraints, and behavior.
    severity: error
    phase: solution-design
    gate: CTR-001
    validator:
      type: manual
      checklist:
        - Contract file exists
        - Contract has required sections
        - Contract links to requirements
    evidence:
      - documentation

  - id: CTR-002
    title: Contract is validated
    description: Contracts must be validated before implementation.
    severity: error
    phase: solution-design
    gate: CTR-002
    validator:
      type: manual
      checklist:
        - Contract is complete
        - Contract is consistent
        - Contract is feasible
    evidence:
      - code-review

  - id: CTR-003
    title: Contract is verified
    description: Implementation must satisfy the contract.
    severity: error
    phase: verification
    gate: CTR-003
    validator:
      type: manual
      checklist:
        - Functional contract satisfied
        - Non-functional contract satisfied
        - Interface contract satisfied
        - Edge cases handled
    evidence:
      - test-output
      - manual-check

  - id: CTR-004
    title: Traceability is maintained
    description: Traceability between requirements, contracts, implementation, and tests must be maintained.
    severity: warning
    phase: final-review
    gate: CTR-004
    validator:
      type: manual
      checklist:
        - Requirements link to contracts
        - Contracts link to implementation
        - Implementation links to tests
    evidence:
      - documentation
