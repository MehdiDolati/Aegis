# ASES Design Rules
# Rules for Phases 2-4: Requirement Review, Impact Analysis, Solution Design

rules:
  - id: REV-001
    title: Validation report exists
    description: A Requirement Validation Report must exist after reviewing the specification.
    severity: error
    phase: requirement-review
    gate: REV-001
    validator:
      type: automated
      checklist:
        - Validation Report file exists
        - Report is not empty
    evidence:
      - documentation

  - id: REV-002
    title: No unresolved ambiguities
    description: All ambiguities identified during review must be resolved or documented.
    severity: error
    phase: requirement-review
    gate: REV-002
    validator:
      type: manual
      checklist:
        - Ambiguities are listed
        - Each ambiguity has resolution or is documented as accepted
    evidence:
      - documentation

  - id: REV-003
    title: No unresolved contradictions
    description: All contradictions identified during review must be resolved.
    severity: error
    phase: requirement-review
    gate: REV-003
    validator:
      type: manual
      checklist:
        - Contradictions are listed
        - Each contradiction has resolution
    evidence:
      - documentation

  - id: REV-004
    title: All requirements are testable
    description: Every requirement must have a clear way to verify it.
    severity: error
    phase: requirement-review
    gate: REV-004
    validator:
      type: manual
      checklist:
        - Each requirement has verification method
        - Verification methods are specific
    evidence:
      - documentation

  - id: REV-005
    title: Technical conflicts resolved
    description: Any technical conflicts between requirements must be resolved.
    severity: error
    phase: requirement-review
    gate: REV-005
    validator:
      type: manual
      checklist:
        - Technical conflicts are identified
        - Conflicts have resolution
    evidence:
      - documentation

  - id: IMP-001
    title: Impact Assessment exists
    description: An Impact Assessment must exist before implementation.
    severity: error
    phase: impact-analysis
    gate: IMP-001
    validator:
      type: automated
      checklist:
        - Impact Assessment file exists
        - Assessment is not empty
    evidence:
      - documentation

  - id: IMP-002
    title: All affected files identified
    description: The Impact Assessment must list all files that will be modified.
    severity: error
    phase: impact-analysis
    gate: IMP-002
    validator:
      type: manual
      checklist:
        - Affected files are listed
        - Files are categorized (modified, created, deleted)
    evidence:
      - documentation

  - id: IMP-003
    title: Risk level assessed
    description: The Impact Assessment must include a risk level assessment.
    severity: error
    phase: impact-analysis
    gate: IMP-003
    validator:
      type: manual
      checklist:
        - Risk level is specified (Low/Medium/High/Critical)
        - Risk factors are documented
    evidence:
      - documentation

  - id: IMP-004
    title: High/Critical risks reviewed
    description: High or Critical risks must be reviewed by appropriate authority.
    severity: error
    phase: impact-analysis
    gate: IMP-004
    validator:
      type: manual
      checklist:
        - High/Critical risks are identified
        - Review by Tech Lead or Architect is documented
    evidence:
      - code-review

  - id: DES-001
    title: Implementation Plan exists
    description: An Implementation Plan must exist before coding begins.
    severity: error
    phase: solution-design
    gate: DES-001
    validator:
      type: automated
      checklist:
        - Implementation Plan file exists
        - Plan is not empty
    evidence:
      - documentation

  - id: DES-002
    title: Task Breakdown exists
    description: The implementation must be broken down into manageable tasks.
    severity: error
    phase: solution-design
    gate: DES-002
    validator:
      type: manual
      checklist:
        - Tasks are listed
        - Tasks are small enough to verify independently
        - Tasks trace to requirements
    evidence:
      - documentation

  - id: DES-003
    title: Plan reviewed and approved
    description: The Implementation Plan must be reviewed and approved before proceeding.
    severity: error
    phase: solution-design
    gate: DES-003
    validator:
      type: manual
      checklist:
        - Plan is reviewed by human
        - Approval is documented
    evidence:
      - code-review

  - id: DES-004
    title: ADR created for architectural decisions
    description: An Architecture Decision Record must be created for significant architectural decisions.
    severity: error
    phase: solution-design
    gate: DES-004
    validator:
      type: manual
      checklist:
        - Architectural decisions are identified
        - ADR exists for each significant decision
        - ADR follows template format
    evidence:
      - documentation
    exceptions:
      - condition: "No architectural decisions made"
        approval_required: false
