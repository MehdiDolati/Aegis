# ASES Implementation Rules
# Rules for Phase 5: Controlled Implementation

rules:
  - id: IMPL-001
    title: Code compiles/builds
    description: All code must compile or build successfully.
    severity: error
    phase: controlled-implementation
    gate: IMPL-001
    validator:
      type: automated
      tool: "build-system"
      script: "build"
    evidence:
      - build-output
    examples:
      - description: "Successful build"
        compliant: "Build exits with code 0"
        non_compliant: "Build exits with non-zero code"

  - id: IMPL-002
    title: Unit tests pass
    description: All unit tests must pass.
    severity: error
    phase: controlled-implementation
    gate: IMPL-002
    validator:
      type: automated
      tool: "test-framework"
      script: "test:unit"
    evidence:
      - test-output

  - id: IMPL-003
    title: No scope drift detected
    description: Implementation must stay within approved scope.
    severity: error
    phase: controlled-implementation
    gate: IMPL-003
    validator:
      type: manual
      checklist:
        - Changes match implementation plan
        - No unauthorized refactoring
        - No new features added
        - No new dependencies added
    evidence:
      - code-review
    examples:
      - description: "Scope control"
        compliant: "Only files listed in plan are modified"
        non_compliant: "Additional files modified without approval"

  - id: IMPL-004
    title: Commit messages are descriptive
    description: Git commits must have descriptive messages.
    severity: warning
    phase: controlled-implementation
    gate: IMPL-004
    validator:
      type: automated
      checklist:
        - Commit message is not empty
        - Commit message is descriptive
        - Commit message references task/feature
    evidence:
      - manual-check

  - id: IMPL-005
    title: No unauthorized refactoring
    description: Refactoring outside approved scope is prohibited.
    severity: error
    phase: controlled-implementation
    gate: IMPL-005
    validator:
      type: manual
      checklist:
        - No refactoring outside plan
        - Code structure follows plan
    evidence:
      - code-review
    examples:
      - description: "Authorized refactoring"
        compliant: "Refactoring documented in implementation plan"
        non_compliant: "Refactoring added without plan update"
