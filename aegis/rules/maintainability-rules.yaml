# ASES Maintainability Rules
# Rules for Phase 8: Maintainability Audit

rules:
  - id: MAINT-001
    title: No dead code
    description: Dead code (unused classes, methods, variables) must not exist.
    severity: error
    phase: maintainability-audit
    gate: MAINT-001
    validator:
      type: automated
      tool: "linter"
      script: "lint:dead-code"
    evidence:
      - tool-output
    examples:
      - description: "Dead code detection"
        compliant: "All code is referenced"
        non_compliant: "Unused method found in OrderService"

  - id: MAINT-002
    title: No unused imports
    description: Unused imports must be removed.
    severity: error
    phase: maintainability-audit
    gate: MAINT-002
    validator:
      type: automated
      tool: "linter"
      script: "lint:imports"
    evidence:
      - tool-output

  - id: MAINT-003
    title: Complexity within threshold
    description: Cyclomatic complexity must be within project threshold.
    severity: warning
    phase: maintainability-audit
    gate: MAINT-003
    validator:
      type: automated
      tool: "complexity-analyzer"
      script: "analyze:complexity"
    evidence:
      - tool-output
    exceptions:
      - condition: "Complexity threshold not configured"
        approval_required: true
        approver: "Tech Lead"

  - id: MAINT-004
    title: No code duplication
    description: Significant code duplication must be addressed.
    severity: warning
    phase: maintainability-audit
    gate: MAINT-004
    validator:
      type: automated
      tool: "duplication-detector"
      script: "analyze:duplication"
    evidence:
      - tool-output

  - id: MAINT-005
    title: Architecture compliance
    description: Code must comply with project architecture.
    severity: error
    phase: maintainability-audit
    gate: MAINT-005
    validator:
      type: manual
      checklist:
        - Code follows architectural patterns
        - No circular dependencies
        - Proper layer separation
    evidence:
      - code-review
