# ASES Verification Rules
# Rules for Phase 6: Verification

rules:
  - id: VER-001
    title: All unit tests pass
    description: All unit tests must pass before proceeding.
    severity: error
    phase: verification
    gate: VER-001
    validator:
      type: automated
      tool: "test-framework"
      script: "test:unit"
    evidence:
      - test-output

  - id: VER-002
    title: All integration tests pass
    description: All integration tests must pass before proceeding.
    severity: error
    phase: verification
    gate: VER-002
    validator:
      type: automated
      tool: "test-framework"
      script: "test:integration"
    evidence:
      - test-output

  - id: VER-003
    title: E2E tests pass (if applicable)
    description: E2E tests must pass if the feature is user-facing.
    severity: error
    phase: verification
    gate: VER-003
    validator:
      type: automated
      tool: "test-framework"
      script: "test:e2e"
    evidence:
      - test-output
    exceptions:
      - condition: "Feature is not user-facing"
        approval_required: false

  - id: VER-004
    title: All acceptance criteria verified
    description: Every Acceptance Criterion must have verified evidence.
    severity: error
    phase: verification
    gate: VER-004
    validator:
      type: manual
      checklist:
        - Each AC has verification evidence
        - Evidence is specific (test, screenshot, log)
        - All ACs pass
    evidence:
      - test-output
      - screenshot
      - manual-check

  - id: VER-005
    title: Test coverage meets threshold
    description: Test coverage must meet the project threshold.
    severity: warning
    phase: verification
    gate: VER-005
    validator:
      type: automated
      tool: "coverage-tool"
      script: "test:coverage"
    evidence:
      - coverage-report
    exceptions:
      - condition: "Coverage threshold not configured"
        approval_required: true
        approver: "Tech Lead"

  - id: VER-006
    title: No test quality issues
    description: Tests must be meaningful and well-structured.
    severity: warning
    phase: verification
    gate: VER-006
    validator:
      type: manual
      checklist:
        - Tests have descriptive names
        - Tests are independent
        - Tests have meaningful assertions
        - No obsolete tests
        - No duplicated tests
    evidence:
      - code-review
