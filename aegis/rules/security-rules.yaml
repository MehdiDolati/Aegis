# ASES Security Rules
# Rules for cross-phase security requirements

rules:
  - id: SEC-001
    title: No hardcoded secrets
    description: API keys, passwords, and other secrets must not be hardcoded in source code.
    severity: error
    phase: controlled-implementation
    gate: SEC-001
    validator:
      type: automated
      tool: "secret-scanner"
      script: "scan:secrets"
    evidence:
      - tool-output
    examples:
      - description: "Secret detection"
        compliant: "Secrets stored in environment variables"
        non_compliant: "API key hardcoded in source file"

  - id: SEC-002
    title: Input validation implemented
    description: All user inputs must be validated and sanitized.
    severity: error
    phase: controlled-implementation
    gate: SEC-002
    validator:
      type: manual
      checklist:
        - All inputs are validated
        - SQL queries use parameterization
        - Output is sanitized
    evidence:
      - code-review

  - id: SEC-003
    title: Dependencies reviewed
    description: All dependencies must be reviewed for known vulnerabilities.
    severity: error
    phase: controlled-implementation
    gate: SEC-003
    validator:
      type: automated
      tool: "dependency-checker"
      script: "check:dependencies"
    evidence:
      - tool-output

  - id: SEC-004
    title: Authentication required
    description: Authentication must be required for protected resources.
    severity: error
    phase: controlled-implementation
    gate: SEC-004
    validator:
      type: manual
      checklist:
        - Authentication is implemented
        - Sessions are managed securely
    evidence:
      - code-review

  - id: SEC-005
    title: Authorization verified
    description: Authorization must be verified at every access point.
    severity: error
    phase: controlled-implementation
    gate: SEC-005
    validator:
      type: manual
      checklist:
        - Authorization checks are in place
        - Least privilege is enforced
    evidence:
      - code-review
