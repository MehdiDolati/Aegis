# React Project Policy
# A policy for React projects

name: react-policy
version: 1.0.0
description: |
  Policy for React projects using TypeScript, Jest, and standard React practices.

author: Aegis Project
created: 2026-07-22
updated: 2026-07-22

technology:
  language:
    - TypeScript
    - JavaScript

  framework:
    - React
    - Next.js
    - Tailwind CSS

  test_framework:
    - Jest
    - React Testing Library
    - Playwright

  linter:
    - ESLint
    - Prettier

  formatter:
    - Prettier

rules:
  include:
    - ../aegis/rules/specification-rules.yaml
    - ../aegis/rules/design-rules.yaml
    - ../aegis/rules/implementation-rules.yaml
    - ../aegis/rules/verification-rules.yaml
    - ../aegis/rules/documentation-rules.yaml
    - ../aegis/rules/maintainability-rules.yaml
    - ../aegis/rules/traceability-rules.yaml
    - ../aegis/rules/security-rules.yaml

  exclude: []

  overrides: []

gates:
  phases:
    - specification
    - requirement-review
    - impact-analysis
    - solution-design
    - controlled-implementation
    - verification
    - documentation
    - maintainability-audit
    - technical-debt-review
    - final-review

  severity_override: {}

testing:
  unit_coverage: 80
  integration_required: false
  e2e_required: true
  e2e_framework: Playwright

documentation:
  user_manual: true
  api_docs: true
  release_notes: true
  adr_required: true

security:
  secret_scanning: true
  dependency_review: true
  input_validation: true

definition_of_done:
  specification_exists: true
  acceptance_criteria_defined: true
  code_implemented: true
  code_reviewed: true
  unit_tests_pass: true
  e2e_tests_pass: true
  documentation_updated: true
  traceability_complete: true

definition_of_ready:
  business_problem_understood: true
  acceptance_criteria_approved: true
  dependencies_resolved: true
