feature:
  requires_spec: true
  requires_implementation_report: true
  requires_user_manual_update: true
  requires_test_plan: true

quality:
  require_acceptance_criteria: true
  require_definition_of_done: true
  require_traceability: true

testing:
  require_unit_tests: true
  require_integration_tests: true
  require_e2e_tests: true

documentation:
  require_release_notes: true
  require_user_manual: true

governance:
  reject_if_missing_artifacts: true
  reject_if_failed_quality_gate: true
