# MiMoCode Configuration for Aegis

agent:
  name: aegis-compliant
  version: 1.0.0

instructions:
  - AGENTS.md

rules:
  include:
    - aegis/rules/specification-rules.yaml
    - aegis/rules/design-rules.yaml
    - aegis/rules/implementation-rules.yaml
    - aegis/rules/verification-rules.yaml
    - aegis/rules/documentation-rules.yaml
    - aegis/rules/maintainability-rules.yaml
    - aegis/rules/traceability-rules.yaml
    - aegis/rules/security-rules.yaml

phases:
  - specification
  - requirement-review
  - impact-analysis
  - solution-design
  - controlled-implementation
  - verification
  - documentation
  - maintainability-audit
  - technical-debt-review
  - final-review

artifacts:
  feature_specification: true
  impact_assessment: true
  implementation_plan: true
  task_breakdown: true
  source_code: true
  unit_tests: true
  integration_tests: true
  documentation: true
  implementation_report: true
  traceability_matrix: true

quality_gates:
  enforce: true
  block_on_error: true

verification:
  run_tests: true
  check_coverage: true
  verify_acceptance_criteria: true
