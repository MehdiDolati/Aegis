# Aegis Gate Schema
# Defines the structure for quality gates

$schema: "http://json-schema.org/draft-07/schema#"
title: Aegis Quality Gate
description: Machine-readable definition of a quality gate

type: object
required:
  - id
  - title
  - description
  - severity
  - phase

properties:
  id:
    type: string
    description: Unique gate identifier (e.g., SPEC-001)
    pattern: "^[A-Z]+-[0-9]{3}$"

  title:
    type: string
    description: Short description of the gate
    minLength: 10
    maxLength: 100

  description:
    type: string
    description: Detailed explanation of the gate
    minLength: 20

  severity:
    type: string
    description: Gate severity level
    enum:
      - error
      - warning
      - info

  phase:
    type: string
    description: SDLC phase this gate belongs to
    enum:
      - specification
      - requirement-review
      - impact-analysis
      - solution-design
      - controlled-implementation
      - verification
      - documentation
      - maintainability-audit
      - technical-debt-review
      - final-review

  validator:
    type: object
    description: How to validate this gate
    properties:
      type:
        type: string
        description: Validation method
        enum:
          - automated
          - manual
          - hybrid

      tool:
        type: string
        description: Tool to use for validation (if automated)

      script:
        type: string
        description: Script to run for validation (if automated)

      checklist:
        type: array
        description: Checklist items (if manual or hybrid)
        items:
          type: string

  evidence:
    type: array
    description: Types of evidence required
    items:
      type: string
      enum:
        - test-output
        - build-output
        - lint-output
        - coverage-report
        - screenshot
        - documentation
        - code-review
        - manual-verification

  exceptions:
    type: array
    description: Conditions when this gate can be skipped
    items:
      type: object
      properties:
        condition:
          type: string
          description: Condition for exception
        approval_required:
          type: boolean
          description: Whether approval is required to skip
        approver:
          type: string
          description: Who can approve the exception

  auto_fix:
    type: object
    description: Whether this gate can be automatically fixed
    properties:
      enabled:
        type: boolean
        default: false

      script:
        type: string
        description: Script to run for auto-fix

  references:
    type: array
    description: Related documentation or standards
    items:
      type: string

required:
  - id
  - title
  - description
  - severity
  - phase
  - validator
  - evidence

additionalProperties: false
