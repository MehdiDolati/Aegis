# Aegis Artifact Schema
# Defines the structure for required artifacts

$schema: "http://json-schema.org/draft-07/schema#"
title: Aegis Artifact
description: Machine-readable definition of a required artifact

type: object
required:
  - id
  - name
  - phase
  - format
  - required

properties:
  id:
    type: string
    description: Unique artifact identifier (e.g., ART-001)
    pattern: "^ART-[0-9]{3}$"

  name:
    type: string
    description: Artifact name
    minLength: 5
    maxLength: 100

  description:
    type: string
    description: Artifact description
    minLength: 20

  phase:
    type: string
    description: SDLC phase this artifact belongs to
    enum:
      - specification
      - requirement-review
      - impact-analysis
      - solution-design
      - controlled-implementation
      - verification
      - documentation
      - maintainability-audit
      - technical-debt-review
      - final-review

  format:
    type: string
    description: Artifact format
    enum:
      - markdown
      - yaml
      - json
      - code
      - test
      - documentation
      - report

  required:
    type: boolean
    description: Whether this artifact is always required
    default: true

  conditional:
    type: object
    description: Conditions when this artifact is required
    properties:
      condition:
        type: string
        description: Condition for requirement
      example:
        type: string
        description: Example of when this applies

  template:
    type: string
    description: Path to template file (if applicable)

  sections:
    type: array
    description: Required sections in the artifact
    items:
      type: object
      properties:
        name:
          type: string
        required:
          type: boolean
        description:
          type: string

  validation:
    type: object
    description: How to validate this artifact
    properties:
      schema:
        type: string
        description: Schema to validate against (if applicable)
      checklist:
        type: array
        description: Validation checklist
        items:
          type: string

  references:
    type: array
    description: Related documentation
    items:
      type: string

required:
  - id
  - name
  - phase
  - format
  - required

additionalProperties: false
