# Aegis Policy Schema
# Defines the structure for project policies

$schema: "http://json-schema.org/draft-07/schema#"
title: Aegis Policy
description: Machine-readable definition of a project policy

type: object
required:
  - name
  - version
  - description
  - technology
  - rules

properties:
  name:
    type: string
    description: Policy name (e.g., "certus-policy")
    pattern: "^[a-z][a-z0-9-]*$"

  version:
    type: string
    description: Policy version (semver)
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"

  description:
    type: string
    description: Policy description
    minLength: 20

  author:
    type: string
    description: Policy author

  created:
    type: string
    description: Creation date (ISO 8601)
    format: date

  updated:
    type: string
    description: Last update date (ISO 8601)
    format: date

  technology:
    type: object
    description: Technology stack configuration
    properties:
      language:
        type: array
        description: Programming languages
        items:
          type: string

      framework:
        type: array
        description: Frameworks used
        items:
          type: string

      test_framework:
        type: array
        description: Testing frameworks
        items:
          type: string

      linter:
        type: array
        description: Linting tools
        items:
          type: string

      formatter:
        type: array
        description: Code formatters
        items:
          type: string

  rules:
    type: object
    description: Rule configuration
    properties:
      include:
        type: array
        description: Rule files to include
        items:
          type: string

      exclude:
        type: array
        description: Rule files to exclude
        items:
          type: string

      overrides:
        type: array
        description: Rule-specific overrides
        items:
          type: object
          properties:
            rule_id:
              type: string
            severity:
              type: string
              enum:
                - error
                - warning
                - info
            enabled:
              type: boolean

  gates:
    type: object
    description: Quality gate configuration
    properties:
      phases:
        type: array
        description: Phases to enforce
        items:
          type: string

      severity_override:
        type: object
        description: Override gate severity
        additionalProperties:
          type: string
          enum:
            - error
            - warning
            - info

  testing:
    type: object
    description: Testing configuration
    properties:
      unit_coverage:
        type: number
        description: Minimum unit test coverage percentage
        minimum: 0
        maximum: 100
        default: 80

      integration_required:
        type: boolean
        description: Whether integration tests are required
        default: true

      e2e_required:
        type: boolean
        description: Whether E2E tests are required
        default: false

      e2e_framework:
        type: string
        description: E2E testing framework to use

  documentation:
    type: object
    description: Documentation requirements
    properties:
      user_manual:
        type: boolean
        description: Whether user manual is required
        default: true

      api_docs:
        type: boolean
        description: Whether API documentation is required
        default: true

      release_notes:
        type: boolean
        description: Whether release notes are required
        default: true

      adr_required:
        type: boolean
        description: Whether ADR is required for architectural decisions
        default: true

  security:
    type: object
    description: Security requirements
    properties:
      secret_scanning:
        type: boolean
        description: Whether secret scanning is required
        default: true

      dependency_review:
        type: boolean
        description: Whether dependency review is required
        default: true

      input_validation:
        type: boolean
        description: Whether input validation is required
        default: true

  definition_of_done:
    type: object
    description: Project-specific Definition of Done
    additionalProperties:
      type: boolean

  definition_of_ready:
    type: object
    description: Project-specific Definition of Ready
    additionalProperties:
      type: boolean

required:
  - name
  - version
  - description
  - technology
  - rules

additionalProperties: false
