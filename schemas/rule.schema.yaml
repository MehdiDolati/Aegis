# Aegis Rule Schema
# Defines the structure for ASES rules

$schema: "http://json-schema.org/draft-07/schema#"
title: Aegis Rule
description: Machine-readable definition of an ASES rule

type: object
required:
  - id
  - title
  - description
  - severity
  - phase
  - gate

properties:
  id:
    type: string
    description: Unique rule identifier (e.g., SPEC-001)
    pattern: "^[A-Z]+-[0-9]{3}$"

  title:
    type: string
    description: Short description of the rule
    minLength: 10
    maxLength: 100

  description:
    type: string
    description: Detailed explanation of the rule
    minLength: 20

  severity:
    type: string
    description: Rule severity level
    enum:
      - error
      - warning
      - info
    description: |
      - error: Blocks progression, must be resolved
      - warning: Flags risk, should be addressed
      - info: Informational, no blocking

  phase:
    type: string
    description: SDLC phase this rule applies to
    enum:
      - specification
      - requirement-review
      - impact-analysis
      - solution-design
      - controlled-implementation
      - verification
      - documentation
      - maintainability-audit
      - technical-debt-review
      - final-review

  gate:
    type: string
    description: Quality gate this rule is associated with
    pattern: "^[A-Z]+-[0-9]{3}$"

  validator:
    type: string
    description: How to validate this rule (tool, script, or manual check)

  evidence:
    type: array
    description: Types of evidence required to prove compliance
    items:
      type: string
      enum:
        - test
        - screenshot
        - log
        - documentation
        - code-review
        - manual-check
        - tool-output

  exceptions:
    type: array
    description: Conditions when this rule can be skipped
    items:
      type: string

  auto_fix:
    type: boolean
    description: Whether this rule can be automatically fixed
    default: false

  references:
    type: array
    description: Related documentation or standards
    items:
      type: string

  examples:
    type: array
    description: Examples of compliant and non-compliant behavior
    items:
      type: object
      properties:
        description:
          type: string
        compliant:
          type: string
        non_compliant:
          type: string

required:
  - id
  - title
  - description
  - severity
  - phase
  - gate
  - evidence

additionalProperties: false
